    // 2) Programa una función que te devuelva el texto 
    // recortado según el número de caracteres indicados, 
    // pe. miFuncion("Hola Mundo", 4) devolverá "Hola".

    const recortarTexto = (texto = '', longitud = undefined) =>
      (!texto)
        ? console.warn("No ingresaste ninguna cadena de texto")
        : (longitud === undefined)
          ? console.warn("No ingresaste una lonigitud para recortar la cadena de texto")
          : console.info(texto.slice(0, longitud));
    // recortarTexto('Hola Mundo', 4);

    // 3) Programa una función que dada una String te devuelva un Array 
    // de textos separados por cierto caracter, pe. miFuncion('hola que tal', ' ') 
    // devolverá ['hola', 'que', 'tal'].
    const cadenaArreglo = (texto = '', separador = undefined) =>
      (!texto)
        ? console.warn("No ingresaste ninguna cadena de texto")
        : (separador === undefined)
          ? console.warn("No ingresaste el caracter separador")
          : console.info(texto.split(separador));

    // cadenaArreglo('Hola que tal', ' ');





    // 4) Programa una función que repita un texto X veces, pe. 
    // miFuncion('Hola Mundo', 3) devolverá Hola Mundo Hola Mundo
    //  Hola Mundo.
    const repetirTexto = (texto = 0, repeticiones = undefined) => {
      if (!texto) return console.warn("No ingresaste ninguna cadena de texto")
      if (repeticiones === undefined) return console.wan('No ingresaste el numero para repetir el texto');
      if (repeticiones === 0) return console.error('El numero de veces no puede ser 0');
      if (Math.sign(repeticiones) === -1) console.error('El numero de veces no puede ser negativo');

      for (let i = 0; i < repeticiones; i++) {
        console.info(`${texto}, ${i + 1}`);
      }
    }
